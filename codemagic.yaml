workflows:
  # ─────────────────────────────────────────────
  # 1. Auto-build: push to main → TestFlight
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS Release to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - Akifi
      vars:
        XCODE_PROJECT: "AkifiIOS.xcodeproj"
        XCODE_SCHEME: "AkifiIOS"
        BUNDLE_ID: "ru.akifi.app"
        TEAM_ID: "8GPVB9MQ58"
        # Comma-separated TestFlight group names for auto-distribution
        BETA_GROUPS: "Beta Testers,External Testers"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Decode App Store Connect API key
        # Must run BEFORE any step that wants to talk to App Store
        # Connect (auto-version, signing, submission). Past releases
        # silently fell back to project.yml's MARKETING_VERSION
        # because this happened later — Apple then rejected the
        # bundle ("train 1.3.0 is closed"). Now we set it up first
        # so every downstream Python script can sign JWTs reliably.
        script: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          if [ ! -s "$KEY_PATH" ]; then
            echo "ERROR: Decoded .p8 key is empty. Check APP_STORE_CONNECT_PRIVATE_KEY_BASE64 secret in Codemagic."
            exit 1
          fi
          echo "ASC API key decoded: $KEY_PATH ($(wc -c < "$KEY_PATH") bytes)"

      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Lint multi-currency amount usage (ADR-001)
        # Blocking as of Phase 8 (2026-04-22) — at the time of flipping,
        # the codebase was at 0 Swift hits and 0 TS hits (verified via
        # `bash Scripts/lint-amount-usage.sh`). Any new aggregation
        # reading `tx.amount` without going through `amountInBase` (Swift)
        # or `amount_in_base` (TS edge functions) now fails the build.
        # See ADR-001 and `.claude/plans/cosmic-purring-wand.md` for why.
        script: |
          bash Scripts/lint-amount-usage.sh --strict

      - name: Generate xcconfig from environment variables
        script: |
          python3 << 'PYEOF'
          import os
          url = os.environ["SUPABASE_URL"].strip().replace("//", "/$()/")
          key = os.environ["SUPABASE_ANON_KEY"].strip().replace("\n", "").replace(" ", "")
          # EXCHANGE_RATE_API_KEY is optional — Phase 6 Reconciliation UI
          # uses it for historical FX quotes; absence falls back to the
          # free open.er-api.com (latest only). The CI env group "Akifi"
          # should hold it so Release builds get the Pro Plan quota.
          exrate = os.environ.get("EXCHANGE_RATE_API_KEY", "").strip()
          for path in ("Config/Release.xcconfig", "Config/Debug.xcconfig"):
              with open(path, "w") as f:
                  f.write(f"SUPABASE_URL = {url}\n")
                  f.write(f"SUPABASE_ANON_KEY = {key}\n")
                  if exrate:
                      f.write(f"EXCHANGE_RATE_API_KEY = {exrate}\n")
          print(f"URL: {url[:40]}...")
          print(f"KEY: {key[:20]}...{key[-10:]}")
          print(f"KEY length: {len(key)}")
          print(f"EXCHANGE_RATE_API_KEY: {'set' if exrate else 'MISSING — Phase 6 historical rates disabled'}")
          PYEOF

      - name: Auto-version, set build number and generate Xcode project
        script: |
          # ── 1. Unique build number from timestamp ──
          BUILD_NUM=$(($(date +%s) / 60))
          echo "Build number: $BUILD_NUM"
          sed -i '' "s/CURRENT_PROJECT_VERSION: 1/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml

          # ── 2. Auto-detect next version from App Store Connect ──
          # Queries ASC for the latest approved/in-review version and the latest
          # TestFlight version. Picks the highest and bumps the patch component.
          # This prevents "train is closed" errors without manual version edits.
          pip3 install PyJWT cryptography requests --quiet

          NEXT_VERSION=$(python3 << 'PYEOF'
          import jwt, time, os, requests, sys

          key_id = os.environ.get("APP_STORE_CONNECT_KEY_IDENTIFIER", "")
          issuer_id = os.environ.get("APP_STORE_CONNECT_ISSUER_ID", "")
          bundle_id = os.environ.get("BUNDLE_ID", "ru.akifi.app")

          key_path = f"{os.environ['HOME']}/.appstoreconnect/private_keys/AuthKey_{key_id}.p8"
          if not os.path.exists(key_path):
              # Fallback: use version from project.yml as-is
              print("")
              sys.exit(0)

          with open(key_path) as f:
              private_key = f.read()

          token = jwt.encode(
              {"iss": issuer_id, "iat": int(time.time()), "exp": int(time.time()) + 600, "aud": "appstoreconnect-v1"},
              private_key, algorithm="ES256", headers={"kid": key_id}
          )
          H = {"Authorization": f"Bearer {token}"}
          BASE = "https://api.appstoreconnect.apple.com/v1"

          # Get app ID
          r = requests.get(f"{BASE}/apps?filter[bundleId]={bundle_id}", headers=H)
          if not r.ok:
              print("", file=sys.stdout)
              sys.exit(0)
          app_id = r.json()["data"][0]["id"]

          # Get all App Store versions (approved, in review, prepare for submission)
          r = requests.get(f"{BASE}/apps/{app_id}/appStoreVersions?filter[platform]=IOS&limit=10", headers=H)
          store_versions = []
          if r.ok:
              for v in r.json()["data"]:
                  vs = v["attributes"]["versionString"]
                  store_versions.append(vs)

          # Get latest TestFlight build version
          r = requests.get(f"{BASE}/builds?filter[app]={app_id}&sort=-uploadedDate&limit=5", headers=H)
          tf_versions = []
          if r.ok:
              for b in r.json()["data"]:
                  pv = b["attributes"].get("preReleaseVersion")
                  if pv:
                      # preReleaseVersion is a relationship, not inline
                      pass
          # Also check preReleaseVersions
          r = requests.get(f"{BASE}/apps/{app_id}/preReleaseVersions?sort=-version&limit=5&filter[platform]=IOS", headers=H)
          if r.ok:
              for v in r.json()["data"]:
                  tf_versions.append(v["attributes"]["version"])

          all_versions = store_versions + tf_versions
          print(f"Found versions: store={store_versions}, tf={tf_versions}", file=sys.stderr)

          def parse_ver(v):
              parts = v.split(".")
              return tuple(int(p) for p in parts if p.isdigit())

          if not all_versions:
              print("")
              sys.exit(0)

          max_ver = max(all_versions, key=lambda v: parse_ver(v))
          parts = list(parse_ver(max_ver))
          while len(parts) < 3:
              parts.append(0)
          parts[2] += 1  # bump patch
          next_ver = f"{parts[0]}.{parts[1]}.{parts[2]}"
          print(f"Max existing: {max_ver}, next: {next_ver}", file=sys.stderr)
          print(next_ver)
          PYEOF
          )

          if [ -n "$NEXT_VERSION" ]; then
            echo "Auto-detected next version: $NEXT_VERSION"
            CURRENT_VERSION=$(grep 'MARKETING_VERSION:' project.yml | awk '{print $2}')
            sed -i '' "s/MARKETING_VERSION: $CURRENT_VERSION/MARKETING_VERSION: $NEXT_VERSION/" project.yml
            echo "Updated project.yml: MARKETING_VERSION: $NEXT_VERSION"
          else
            echo "WARN: auto-bump produced no version. Will rely on the safety net guard below."
          fi

          # ── 3. Pre-flight guard: refuse to build a known-closed train ──
          # Past failures: a soft fallback let MARKETING_VERSION stay at
          # an already-approved version (e.g. 1.3.0 after 1.3.0 shipped).
          # Apple then rejected the upload at the very end of a 30-min
          # build with codes 90062 / 90186. We fail fast here instead.
          FINAL_VERSION=$(grep 'MARKETING_VERSION:' project.yml | awk '{print $2}')
          echo "Final MARKETING_VERSION going to build: $FINAL_VERSION"

          GUARD_RESULT=$(python3 << PYEOF
          import jwt, time, os, requests, sys

          key_id = os.environ.get("APP_STORE_CONNECT_KEY_IDENTIFIER", "")
          issuer_id = os.environ.get("APP_STORE_CONNECT_ISSUER_ID", "")
          bundle_id = os.environ.get("BUNDLE_ID", "ru.akifi.app")
          target_version = "$FINAL_VERSION"

          key_path = f"{os.environ['HOME']}/.appstoreconnect/private_keys/AuthKey_{key_id}.p8"
          if not os.path.exists(key_path):
              print(f"WARN: cannot validate version — .p8 key missing at {key_path}")
              sys.exit(0)

          with open(key_path) as f:
              private_key = f.read()
          token = jwt.encode(
              {"iss": issuer_id, "iat": int(time.time()), "exp": int(time.time()) + 600, "aud": "appstoreconnect-v1"},
              private_key, algorithm="ES256", headers={"kid": key_id}
          )
          H = {"Authorization": f"Bearer {token}"}
          BASE = "https://api.appstoreconnect.apple.com/v1"

          r = requests.get(f"{BASE}/apps?filter[bundleId]={bundle_id}", headers=H)
          if not r.ok:
              print(f"WARN: cannot fetch app — {r.status_code}")
              sys.exit(0)
          app_id = r.json()["data"][0]["id"]

          # 'READY_FOR_SALE' / 'PENDING_APPLE_RELEASE' / 'PROCESSING_FOR_APP_STORE'
          # / 'IN_REVIEW' / 'WAITING_FOR_REVIEW' / 'PREPARE_FOR_SUBMISSION'
          # — ANY state where Apple has already accepted a binary for this
          # train means we can't reuse the same versionString.
          closed_states = {"READY_FOR_SALE", "PENDING_DEVELOPER_RELEASE", "PROCESSING_FOR_APP_STORE", "IN_REVIEW", "PENDING_APPLE_RELEASE", "REPLACED_WITH_NEW_VERSION"}
          r = requests.get(f"{BASE}/apps/{app_id}/appStoreVersions?filter[platform]=IOS&limit=20", headers=H)
          conflicts = []
          if r.ok:
              for v in r.json()["data"]:
                  vs = v["attributes"]["versionString"]
                  state = v["attributes"]["appStoreState"]
                  if vs == target_version and state in closed_states:
                      conflicts.append((vs, state))
          if conflicts:
              for vs, state in conflicts:
                  print(f"BLOCK: version {vs} is in closed state '{state}' on App Store Connect")
              sys.exit(1)
          print(f"OK: version {target_version} is acceptable")
          sys.exit(0)
          PYEOF
          )
          GUARD_EXIT=$?
          echo "$GUARD_RESULT"
          if [ $GUARD_EXIT -ne 0 ]; then
            echo ""
            echo "==== BUILD ABORTED ===="
            echo "MARKETING_VERSION '$FINAL_VERSION' is already taken on App Store Connect."
            echo "Bump it in project.yml (e.g. 1.3.1 → 1.3.2) and push again."
            echo "======================="
            exit 1
          fi

          grep MARKETING_VERSION project.yml
          grep CURRENT_PROJECT_VERSION project.yml

          # ── 4. Generate Xcode project ──
          xcodegen generate

      - name: Set up signing certificates and API key
        script: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_FILE="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_FILE"
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Resolve SPM dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Apply profiles to project
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

      - name: Upload to TestFlight and distribute to testers
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "Error: No IPA found"
            exit 1
          fi
          echo "Uploading $IPA_PATH to TestFlight..."

          # Build --beta-group flags from comma-separated BETA_GROUPS
          BETA_FLAGS=""
          IFS=',' read -ra GROUPS <<< "$BETA_GROUPS"
          for group in "${GROUPS[@]}"; do
            group=$(echo "$group" | xargs)  # trim whitespace
            if [ -n "$group" ]; then
              BETA_FLAGS="$BETA_FLAGS --beta-group \"$group\""
            fi
          done

          # Upload + distribute to beta groups
          eval app-store-connect publish \
            --path "$IPA_PATH" \
            $BETA_FLAGS \
            --max-build-processing-wait 1800

          echo "Build uploaded and distributed to groups: $BETA_GROUPS"

      - name: Upload dSYMs to Firebase Crashlytics
        script: |
          DSYM_DIR=$(find build/ios/AkifiIOS.xcarchive -name "*.dSYM" -type d 2>/dev/null | head -1)
          if [ -n "$DSYM_DIR" ]; then
            UPLOAD_SCRIPT=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "upload-symbols" -type f 2>/dev/null | head -1)
            if [ -n "$UPLOAD_SCRIPT" ]; then
              "$UPLOAD_SCRIPT" -gsp AkifiIOS/GoogleService-Info.plist -p ios "$DSYM_DIR"
            fi
          fi
        ignore_failure: true

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/AkifiIOS.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - dyadichev.biz@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # 2. Submit to App Store Review (tag release/vX.Y.Z)
  # ─────────────────────────────────────────────
  ios-submit-review:
    name: Submit to App Store Review
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      groups:
        - Akifi
      vars:
        BUNDLE_ID: "ru.akifi.app"
      xcode: latest

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'release/v*'
          include: true

    scripts:
      - name: Set up API key
        script: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode \
            > "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

      - name: Generate release notes and submit for review
        script: |
          # Extract version from tag
          VERSION=$(echo "$CM_TAG" | sed 's|release/v||')
          echo "Version: $VERSION"

          # Generate changelog from git
          PREV_TAG=$(git tag -l 'release/v*' --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "Changelog since $PREV_TAG:"
            RAW_LOG=$(git log --pretty="%s" "$PREV_TAG"..HEAD --no-merges)
          else
            echo "No previous tag, using last 15 commits:"
            RAW_LOG=$(git log --pretty="%s" -15 --no-merges)
          fi
          echo "$RAW_LOG"

          pip3 install PyJWT cryptography requests anthropic --quiet

          python3 << PYEOF
          import jwt, time, os, requests, json, re, sys

          # ── Config ──
          key_id = os.environ["APP_STORE_CONNECT_KEY_IDENTIFIER"]
          issuer_id = os.environ["APP_STORE_CONNECT_ISSUER_ID"]
          bundle_id = os.environ["BUNDLE_ID"]
          version = "$VERSION"

          key_path = f"{os.environ['HOME']}/.appstoreconnect/private_keys/AuthKey_{key_id}.p8"
          with open(key_path) as f:
              private_key = f.read()

          # ── JWT ──
          token = jwt.encode(
              {"iss": issuer_id, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"},
              private_key, algorithm="ES256", headers={"kid": key_id}
          )
          H = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          BASE = "https://api.appstoreconnect.apple.com/v1"

          def api(method, path, **kw):
              r = getattr(requests, method)(f"{BASE}/{path}", headers=H, **kw)
              if not r.ok:
                  print(f"  API {method.upper()} {path}: {r.status_code} {r.text[:200]}")
              return r

          # ── 1. Get app ID ──
          r = api("get", f"apps?filter[bundleId]={bundle_id}")
          r.raise_for_status()
          app_id = r.json()["data"][0]["id"]
          print(f"1. App ID: {app_id}")

          # ── 2. Create or get App Store version ──
          r = api("get", f"apps/{app_id}/appStoreVersions?filter[platform]=IOS")
          r.raise_for_status()
          existing = r.json()["data"]

          version_id = None
          editable_states = {"PREPARE_FOR_SUBMISSION", "DEVELOPER_REJECTED", "REJECTED", "METADATA_REJECTED", "WAITING_FOR_REVIEW", "INVALID_BINARY"}

          # Check if version exists
          for v in existing:
              if v["attributes"]["versionString"] == version:
                  version_id = v["id"]
                  state = v["attributes"]["appStoreState"]
                  print(f"2. Found version {version} (state: {state})")
                  break

          if not version_id:
              # Create new version
              payload = {
                  "data": {
                      "type": "appStoreVersions",
                      "attributes": {"versionString": version, "platform": "IOS"},
                      "relationships": {"app": {"data": {"type": "apps", "id": app_id}}}
                  }
              }
              r = api("post", "appStoreVersions", json=payload)
              if r.ok:
                  version_id = r.json()["data"]["id"]
                  print(f"2. Created version {version}")
              else:
                  print(f"2. Failed to create version: {r.text[:300]}")
                  sys.exit(1)

          # ── 3. Find latest processed build ──
          r = api("get", f"builds?filter[app]={app_id}&filter[processingState]=VALID&sort=-uploadedDate&limit=1")
          r.raise_for_status()
          builds = r.json()["data"]
          if not builds:
              print("3. No processed builds found! Wait for TestFlight build to finish processing.")
              sys.exit(1)

          build_id = builds[0]["id"]
          build_version = builds[0]["attributes"].get("version", "?")
          print(f"3. Latest build: {build_id} (version {build_version})")

          # ── 4. Select build for this version ──
          payload = {
              "data": {"type": "builds", "id": build_id}
          }
          r = api("patch", f"appStoreVersions/{version_id}/relationships/build", json=payload)
          if r.ok or r.status_code == 204:
              print(f"4. Build {build_id} selected for version {version}")
          elif r.status_code == 409:
              print(f"4. Build already selected (conflict ok)")
          else:
              print(f"4. Warning: could not select build: {r.status_code}")

          # ── 5. Generate user-friendly What's New & Promotional Text via Claude ──
          raw_log = """$RAW_LOG""".strip()

          # Discover all locales available for this version
          r = api("get", f"appStoreVersions/{version_id}/appStoreVersionLocalizations")
          localizations = r.json()["data"] if r.ok else []
          locales = [loc["attributes"]["locale"] for loc in localizations]
          print(f"5. Locales to fill: {locales}")

          # Fallback (technical) release notes if Claude is unavailable.
          # Internal-only commit types (docs, chore, ci, test, style, refactor)
          # NEVER appear as bullets — they collapse into a generic
          # "performance and stability" line. App Store reviewers and
          # users don't want to read about README updates.
          def technical_notes(raw):
              features, fixes = [], []
              has_internal = False
              internal_prefixes = ("docs", "chore", "ci", "test", "style", "refactor")
              for line in raw.split("\n"):
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith(internal_prefixes):
                      has_internal = True
                      continue
                  clean = re.sub(r"^(feat|fix|perf)(\(.+?\))?:\s*", "", line)
                  # Strip BETA / Sprint suffixes that organize work
                  # internally but mean nothing to end users.
                  clean = re.sub(r"\s*\[BETA\]\s*$", "", clean, flags=re.IGNORECASE)
                  clean = re.sub(r"\s*Sprint\s+\d+\s*[—–-]\s*", "", clean, flags=re.IGNORECASE)
                  if clean:
                      clean = clean[0].upper() + clean[1:]
                  if line.startswith("feat"):
                      features.append(clean)
                  elif line.startswith("fix"):
                      fixes.append(clean)
                  elif line.startswith("perf"):
                      # Performance counts as user-facing improvement.
                      features.append(clean)
              sections = []
              if features:
                  sections.append("New:\n" + "\n".join(f"• {f}" for f in features))
              if fixes:
                  sections.append("Fixed:\n" + "\n".join(f"• {f}" for f in fixes))
              if has_internal and (features or fixes):
                  sections.append("Improved:\n• Performance and stability improvements")
              elif has_internal:
                  sections.append("Performance and stability improvements.")
              return "\n\n".join(sections) if sections else "Bug fixes and performance improvements."

          # Cheap promo fallback — first user-facing feat headline,
          # truncated to fit the 170-char limit with ellipsis.
          def fallback_promo(raw):
              for line in raw.split("\n"):
                  line = line.strip()
                  if not line.startswith("feat"):
                      continue
                  clean = re.sub(r"^feat(\(.+?\))?:\s*", "", line)
                  clean = re.sub(r"\s*\[BETA\]\s*$", "", clean, flags=re.IGNORECASE)
                  clean = re.sub(r"\s*Sprint\s+\d+\s*[—–-]\s*", "", clean, flags=re.IGNORECASE)
                  if not clean:
                      continue
                  clean = clean[0].upper() + clean[1:]
                  return (clean[:162] + "…") if len(clean) > 165 else clean
              return "Bug fixes and performance improvements."

          localized = {}
          anthropic_key = os.environ.get("ANTHROPIC_API_KEY", "").strip()

          if anthropic_key and locales:
              try:
                  import anthropic
                  client = anthropic.Anthropic(api_key=anthropic_key)
                  prompt_parts = [
                      f"You write App Store release notes for Akifi — an AI-powered personal finance app (budgets, expense tracking, savings goals, subscriptions, AI assistant).",
                      f"",
                      f"Here are the git commits shipped in version {version}:",
                      f"<commits>",
                      raw_log,
                      f"</commits>",
                      f"",
                      f"# Hard rules (read carefully — past versions failed because of these)",
                      f"",
                      f"1. EVERY `feat:` and `fix:` and `perf:` commit in <commits> represents a user-visible change and MUST appear as a bullet. You are NOT allowed to skip them.",
                      f"   - You MAY merge two closely related commits into one bullet (e.g. \"Sprint 4: FIRE projection\" + \"Sprint 5: tooltips for FIRE\" → one bullet about FIRE).",
                      f"   - You MAY NOT drop them silently. Aim for 4-10 user-facing bullets total when 10+ feat commits exist.",
                      f"2. NEVER include `docs:`, `chore:`, `ci:`, `test:`, `style:`, `refactor:` commits as bullets. They go into a single trailing line \"Improved: • Performance and stability improvements\" if any are present.",
                      f"3. Strip internal scaffolding from commit subjects: `[BETA]` markers, `Sprint N —`/`Sprint N:` prefixes, scope parens `(home)/(assets)/...` are organisational and must NOT leak into user-facing copy.",
                      f"4. Forbidden words in user-facing copy: README, FEATURE_ROADMAP, PRD, edge function, Supabase, RLS, migration, repository, ViewModel, codemagic, lint, ADR, schema, API key, JWT, cron job, pg_cron, payload. If you are tempted to write any of these, the right answer is to drop the line.",
                      f"5. Speak to a non-technical iPhone user. Warm, plain, specific. \"Investment portfolio in beta\" is fine. \"AFTER STATEMENT trigger\" is not.",
                      f"6. Headers (use only those that have content): `New:` for new capabilities, `Improved:` for enhancements to existing ones, `Fixed:` for bug fixes. No emojis, no marketing fluff like \"groundbreaking\".",
                      f"",
                      f"# Output for each locale",
                      f"- `whatsNew`: max 3900 chars. Bulleted, headed lists per Rule 6. NEVER blank.",
                      f"- `promotionalText`: max 165 chars. One single sentence that gives a non-user a reason to open the app today. NEVER blank — if the version is mostly fixes, write something like \"Smoother and faster — across budgets, transactions and analytics.\" Always present.",
                      f"",
                      f"# Locales",
                      f"Locales to fill: {json.dumps(locales)}",
                      f"",
                      f"For Russian locales (ru, ru-RU) write in natural Russian. For English locales (en-US, en-GB) in natural English. For any other locale, translate accurately into that locale's language. Use the SAME structure across locales — same number of bullets, same order, just translated.",
                      f"",
                      f"# Response format",
                      f"Respond ONLY with raw JSON, no markdown fences, no commentary, no preamble:",
                      f'{{"<locale>": {{"whatsNew": "...", "promotionalText": "..."}}, ...}}',
                  ]
                  prompt = "\n".join(prompt_parts)

                  msg = client.messages.create(
                      model="claude-sonnet-4-6",
                      max_tokens=8192,
                      messages=[{"role": "user", "content": prompt}],
                  )
                  text = msg.content[0].text.strip()
                  # Strip accidental markdown fences
                  text = re.sub(r"^```(?:json)?\s*|\s*```$", "", text, flags=re.MULTILINE).strip()
                  localized = json.loads(text)
                  print(f"5. Claude generated copy for {len(localized)} locales")
                  # Show the raw output for one locale so a missing
                  # bullet is visible in the Codemagic build log.
                  preview_locale_log = next((l for l in ["en-US", "en-GB", "ru", "ru-RU"] if l in localized), None)
                  if preview_locale_log:
                      e = localized[preview_locale_log]
                      print(f"   Preview [{preview_locale_log}] whatsNew (first 400 chars):")
                      print(f"   {(e.get('whatsNew','') or '')[:400]}")
                      print(f"   Preview [{preview_locale_log}] promo: {e.get('promotionalText','')}")
              except Exception as e:
                  print(f"5. Claude generation failed, falling back to technical notes: {e}")
                  localized = {}
          else:
              print("5. ANTHROPIC_API_KEY not set — using technical fallback notes")

          fallback_notes = technical_notes(raw_log)
          fallback_promo_text = fallback_promo(raw_log)

          for loc in localizations:
              loc_id = loc["id"]
              locale = loc["attributes"]["locale"]
              entry = localized.get(locale, {})
              # Both fields ALWAYS get patched — leaving promo blank
              # means App Store keeps stale text from a previous
              # version, which is worse than a generic line.
              whats_new = (entry.get("whatsNew") or fallback_notes)[:3900]
              promo = (entry.get("promotionalText") or fallback_promo_text)[:165]
              attrs = {"whatsNew": whats_new, "promotionalText": promo}
              payload = {"data": {"id": loc_id, "type": "appStoreVersionLocalizations", "attributes": attrs}}
              r2 = api("patch", f"appStoreVersionLocalizations/{loc_id}", json=payload)
              print(f"5. Localization [{locale}]: {'OK' if r2.ok else r2.status_code}")

          preview_locale = next((l for l in ["en-US", "en-GB", "ru", "ru-RU"] if l in localized), None)
          if preview_locale:
              print(f"\nPreview [{preview_locale}] whatsNew:\n{localized[preview_locale].get('whatsNew','')}")
              print(f"\nPreview [{preview_locale}] promo:\n{localized[preview_locale].get('promotionalText','')}")
          else:
              print(f"\nFallback notes:\n{fallback_notes}")

          # ── 6. Submit for review ──
          # Create reviewSubmission
          payload = {
              "data": {
                  "type": "reviewSubmissions",
                  "attributes": {"platform": "IOS"},
                  "relationships": {"app": {"data": {"type": "apps", "id": app_id}}}
              }
          }
          r = api("post", "reviewSubmissions", json=payload)
          if r.ok:
              submission_id = r.json()["data"]["id"]
              print(f"6. Review submission created: {submission_id}")

              # Add the version as a review item
              payload = {
                  "data": {
                      "type": "reviewSubmissionItems",
                      "relationships": {
                          "reviewSubmission": {"data": {"type": "reviewSubmissions", "id": submission_id}},
                          "appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}
                      }
                  }
              }
              r = api("post", "reviewSubmissionItems", json=payload)
              print(f"6. Review item added: {'OK' if r.ok else r.status_code}")

              # Confirm submission
              payload = {
                  "data": {
                      "type": "reviewSubmissions",
                      "id": submission_id,
                      "attributes": {"submitted": True}
                  }
              }
              r = api("patch", f"reviewSubmissions/{submission_id}", json=payload)
              if r.ok:
                  print(f"\n✅ Version {version} submitted for App Store review!")
              else:
                  print(f"\n⚠️  Submission confirm failed: {r.status_code} {r.text[:200]}")
          else:
              print(f"6. Could not create review submission: {r.status_code} {r.text[:300]}")
              if "REVIEW_ALREADY" in r.text or "already" in r.text.lower():
                  print("   (App may already be in review)")
          PYEOF

    publishing:
      email:
        recipients:
          - dyadichev.biz@gmail.com
        notify:
          success: true
          failure: true
