workflows:
  ios-release:
    name: iOS Release to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - Akifi
      vars:
        XCODE_PROJECT: "AkifiIOS.xcodeproj"
        XCODE_SCHEME: "AkifiIOS"
        BUNDLE_ID: "ru.akifi.app"
        TEAM_ID: "8GPVB9MQ58"
      xcode: 16.2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate xcconfig from environment variables
        script: |
          python3 << 'PYEOF'
          import os
          url = os.environ["SUPABASE_URL"].strip().replace("//", "/$()/")
          key = os.environ["SUPABASE_ANON_KEY"].strip().replace("\n", "").replace(" ", "")
          with open("Config/Release.xcconfig", "w") as f:
              f.write(f"SUPABASE_URL = {url}\nSUPABASE_ANON_KEY = {key}\n")
          with open("Config/Debug.xcconfig", "w") as f:
              f.write(f"SUPABASE_URL = {url}\nSUPABASE_ANON_KEY = {key}\n")
          print(f"URL: {url[:40]}...")
          print(f"KEY: {key[:20]}...{key[-10:]}")
          print(f"KEY length: {len(key)}")
          PYEOF

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Set up signing certificates and API key
        script: |
          # Write API key from base64
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_FILE="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_FILE"
          # Generate fresh RSA key for certificate creation
          openssl genrsa 2048 2>/dev/null > /tmp/cert_key.pem
          # Fetch/create distribution certificate and profile
          keychain initialize
          # Revoke orphaned distribution certs (no matching private key)
          # to make room for a new one
          app-store-connect list-certificates \
            --type DISTRIBUTION \
            --type IOS_DISTRIBUTION 2>/dev/null \
            | grep -oE '[0-9A-Za-z]{10,}' | head -1 \
            | xargs -I{} app-store-connect revoke-certificate {} 2>/dev/null || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:/tmp/cert_key.pem
          keychain add-certificates

      - name: Resolve SPM dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo "0")
          agvtool new-version -all $(($LATEST + 1))

      - name: Apply profiles to project
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

      - name: Upload to TestFlight
        script: |
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -n "$IPA_PATH" ]; then
            xcrun altool --upload-app \
              --file "$IPA_PATH" \
              --type ios \
              --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
          fi

      - name: Upload dSYMs to Firebase Crashlytics
        script: |
          DSYM_DIR=$(find build/ios/AkifiIOS.xcarchive -name "*.dSYM" -type d 2>/dev/null | head -1)
          if [ -n "$DSYM_DIR" ]; then
            UPLOAD_SCRIPT=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "upload-symbols" -type f 2>/dev/null | head -1)
            if [ -n "$UPLOAD_SCRIPT" ]; then
              "$UPLOAD_SCRIPT" -gsp AkifiIOS/GoogleService-Info.plist -p ios "$DSYM_DIR"
            fi
          fi
        ignore_failure: true

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/AkifiIOS.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - dyadichev.biz@gmail.com
        notify:
          success: true
          failure: true
