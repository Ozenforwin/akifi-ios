workflows:
  # ─────────────────────────────────────────────
  # 1. Auto-build: push to main → TestFlight
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS Release to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - Akifi
      vars:
        XCODE_PROJECT: "AkifiIOS.xcodeproj"
        XCODE_SCHEME: "AkifiIOS"
        BUNDLE_ID: "ru.akifi.app"
        TEAM_ID: "8GPVB9MQ58"
        # Comma-separated TestFlight group names for auto-distribution
        BETA_GROUPS: "Beta Testers,External Testers"
      xcode: 16.2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate xcconfig from environment variables
        script: |
          python3 << 'PYEOF'
          import os
          url = os.environ["SUPABASE_URL"].strip().replace("//", "/$()/")
          key = os.environ["SUPABASE_ANON_KEY"].strip().replace("\n", "").replace(" ", "")
          with open("Config/Release.xcconfig", "w") as f:
              f.write(f"SUPABASE_URL = {url}\nSUPABASE_ANON_KEY = {key}\n")
          with open("Config/Debug.xcconfig", "w") as f:
              f.write(f"SUPABASE_URL = {url}\nSUPABASE_ANON_KEY = {key}\n")
          print(f"URL: {url[:40]}...")
          print(f"KEY: {key[:20]}...{key[-10:]}")
          print(f"KEY length: {len(key)}")
          PYEOF

      - name: Set build number and generate Xcode project
        script: |
          BUILD_NUM=$(($(date +%s) / 60))
          echo "Build number: $BUILD_NUM"
          sed -i '' "s/CURRENT_PROJECT_VERSION: 1/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml
          grep CURRENT_PROJECT_VERSION project.yml
          xcodegen generate

      - name: Set up signing certificates and API key
        script: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_FILE="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_FILE"
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Resolve SPM dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Apply profiles to project
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

      - name: Upload to TestFlight and distribute to testers
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "Error: No IPA found"
            exit 1
          fi
          echo "Uploading $IPA_PATH to TestFlight..."

          # Build --beta-group flags from comma-separated BETA_GROUPS
          BETA_FLAGS=""
          IFS=',' read -ra GROUPS <<< "$BETA_GROUPS"
          for group in "${GROUPS[@]}"; do
            group=$(echo "$group" | xargs)  # trim whitespace
            if [ -n "$group" ]; then
              BETA_FLAGS="$BETA_FLAGS --beta-group \"$group\""
            fi
          done

          # Upload + distribute to beta groups
          eval app-store-connect publish \
            --path "$IPA_PATH" \
            $BETA_FLAGS \
            --max-build-processing-wait 1800

          echo "Build uploaded and distributed to groups: $BETA_GROUPS"

      - name: Upload dSYMs to Firebase Crashlytics
        script: |
          DSYM_DIR=$(find build/ios/AkifiIOS.xcarchive -name "*.dSYM" -type d 2>/dev/null | head -1)
          if [ -n "$DSYM_DIR" ]; then
            UPLOAD_SCRIPT=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "upload-symbols" -type f 2>/dev/null | head -1)
            if [ -n "$UPLOAD_SCRIPT" ]; then
              "$UPLOAD_SCRIPT" -gsp AkifiIOS/GoogleService-Info.plist -p ios "$DSYM_DIR"
            fi
          fi
        ignore_failure: true

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/AkifiIOS.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - dyadichev.biz@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # 2. Submit to App Store Review (tag release/vX.Y.Z)
  # ─────────────────────────────────────────────
  ios-submit-review:
    name: Submit to App Store Review
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      groups:
        - Akifi
      vars:
        BUNDLE_ID: "ru.akifi.app"
      xcode: 16.2

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'release/v*'
          include: true

    scripts:
      - name: Set up API key
        script: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode \
            > "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

      - name: Get version from tag
        script: |
          # Tag format: release/v1.2.3
          VERSION=$(echo "$CM_TAG" | sed 's|release/v||')
          echo "Submitting version: $VERSION"
          echo "SUBMIT_VERSION=$VERSION" >> $CM_ENV

      - name: Generate release notes from git history
        script: |
          # Find previous release tag
          PREV_TAG=$(git tag -l 'release/v*' --sort=-v:refname | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog since $PREV_TAG..."
            RAW_LOG=$(git log --pretty="%s" "$PREV_TAG"..HEAD --no-merges)
          else
            echo "No previous tag, using last 15 commits..."
            RAW_LOG=$(git log --pretty="%s" -15 --no-merges)
          fi

          # Group by type and format
          python3 << 'PYEOF'
          import os, re

          raw = os.environ.get("RAW_LOG", "")
          if not raw:
              raw = "Bug fixes and improvements"

          features, fixes, other = [], [], []
          for line in raw.strip().split("\n"):
              line = line.strip()
              if not line:
                  continue
              clean = re.sub(r"^(feat|fix|chore|refactor|docs|test|ci|style|perf)(\(.+?\))?:\s*", "", line)
              clean = clean[0].upper() + clean[1:] if clean else clean
              if line.startswith("feat"):
                  features.append(clean)
              elif line.startswith("fix"):
                  fixes.append(clean)
              else:
                  other.append(clean)

          sections = []
          if features:
              sections.append("New:\n" + "\n".join(f"• {f}" for f in features))
          if fixes:
              sections.append("Fixed:\n" + "\n".join(f"• {f}" for f in fixes))
          if other:
              sections.append("Improved:\n" + "\n".join(f"• {o}" for o in other))

          changelog = "\n\n".join(sections) if sections else "Bug fixes and improvements."
          print(changelog)

          # Write to env file for next step
          with open(os.environ["CM_ENV"], "a") as f:
              # Escape newlines for env var
              escaped = changelog.replace("\n", "\\n")
              f.write(f"RELEASE_NOTES={escaped}\n")
          PYEOF
        env:
          RAW_LOG: $(git log --pretty="%s" $(git tag -l 'release/v*' --sort=-v:refname | sed -n '2p')..HEAD --no-merges 2>/dev/null || git log --pretty="%s" -15 --no-merges)

      - name: Create App Store version
        script: |
          echo "Creating App Store version $SUBMIT_VERSION..."
          app-store-connect app-store-versions create \
            --bundle-id "$BUNDLE_ID" \
            --platform IOS \
            --version-string "$SUBMIT_VERSION" \
            || echo "Version may already exist, continuing..."

      - name: Update What's New in App Store Connect
        script: |
          pip3 install PyJWT cryptography requests --quiet

          python3 << 'PYEOF'
          import jwt, time, os, requests, json

          key_id = os.environ["APP_STORE_CONNECT_KEY_IDENTIFIER"]
          issuer_id = os.environ["APP_STORE_CONNECT_ISSUER_ID"]
          bundle_id = os.environ["BUNDLE_ID"]
          version = os.environ["SUBMIT_VERSION"]
          notes = os.environ.get("RELEASE_NOTES", "Bug fixes and improvements.").replace("\\n", "\n")

          # Generate JWT
          key_path = f"{os.environ['HOME']}/.appstoreconnect/private_keys/AuthKey_{key_id}.p8"
          with open(key_path) as f:
              private_key = f.read()

          token = jwt.encode(
              {"iss": issuer_id, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"},
              private_key, algorithm="ES256", headers={"kid": key_id}
          )

          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          base = "https://api.appstoreconnect.apple.com/v1"

          # Get app ID
          r = requests.get(f"{base}/apps?filter[bundleId]={bundle_id}", headers=headers)
          r.raise_for_status()
          app_id = r.json()["data"][0]["id"]
          print(f"App ID: {app_id}")

          # Get app store version
          r = requests.get(
              f"{base}/apps/{app_id}/appStoreVersions",
              params={"filter[versionString]": version, "filter[platform]": "IOS"},
              headers=headers
          )
          r.raise_for_status()
          versions = r.json()["data"]
          if not versions:
              print(f"Version {version} not found in App Store Connect, skipping metadata update")
              exit(0)

          version_id = versions[0]["id"]
          print(f"Version ID: {version_id}")

          # Get localizations
          r = requests.get(f"{base}/appStoreVersions/{version_id}/appStoreVersionLocalizations", headers=headers)
          r.raise_for_status()
          localizations = r.json()["data"]

          # Update whatsNew for each locale
          for loc in localizations:
              loc_id = loc["id"]
              locale = loc["attributes"]["locale"]
              payload = {
                  "data": {
                      "id": loc_id,
                      "type": "appStoreVersionLocalizations",
                      "attributes": {"whatsNew": notes}
                  }
              }
              r = requests.patch(f"{base}/appStoreVersionLocalizations/{loc_id}", headers=headers, json=payload)
              if r.ok:
                  print(f"Updated What's New for {locale}")
              else:
                  print(f"Failed to update {locale}: {r.status_code} {r.text}")

          print(f"\nRelease notes:\n{notes}")
          PYEOF

      - name: Submit for App Store review
        script: |
          echo "Submitting $SUBMIT_VERSION for App Store review..."
          app-store-connect submit-to-app-store \
            --bundle-id "$BUNDLE_ID" \
            --platform IOS
          echo "Submitted $SUBMIT_VERSION for App Store review!"

    publishing:
      email:
        recipients:
          - dyadichev.biz@gmail.com
        notify:
          success: true
          failure: true
