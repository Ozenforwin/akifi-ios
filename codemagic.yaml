workflows:
  ios-release:
    name: iOS Release to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - Akifi
      vars:
        XCODE_PROJECT: "AkifiIOS.xcodeproj"
        XCODE_SCHEME: "AkifiIOS"
        BUNDLE_ID: "ru.akifi.app"
        TEAM_ID: "8GPVB9MQ58"
      xcode: 16.2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate xcconfig from environment variables
        script: |
          printf 'SUPABASE_URL = %s\nSUPABASE_ANON_KEY = %s\n' \
            "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > Config/Release.xcconfig
          cp Config/Release.xcconfig Config/Debug.xcconfig

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Prepare API Key for Xcode signing
        script: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_FILE="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_FILE"
          echo "Key: $(wc -l < "$KEY_FILE") lines, $(wc -c < "$KEY_FILE") bytes"
          head -1 "$KEY_FILE"

      - name: Resolve SPM dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Increment build number
        script: |
          keychain initialize
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo "0")
          agvtool new-version -all $(($LATEST + 1))

      - name: Build archive
        script: |
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/AkifiIOS.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_FILE" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        script: |
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          cat > exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>8GPVB9MQ58</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/ios/AkifiIOS.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_FILE" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload to TestFlight
        script: |
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -n "$IPA_PATH" ]; then
            xcrun altool --upload-app \
              --file "$IPA_PATH" \
              --type ios \
              --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
          fi

      - name: Upload dSYMs to Firebase Crashlytics
        script: |
          DSYM_DIR=$(find build/ios/AkifiIOS.xcarchive -name "*.dSYM" -type d 2>/dev/null | head -1)
          if [ -n "$DSYM_DIR" ]; then
            UPLOAD_SCRIPT=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "upload-symbols" -type f 2>/dev/null | head -1)
            if [ -n "$UPLOAD_SCRIPT" ]; then
              "$UPLOAD_SCRIPT" -gsp AkifiIOS/GoogleService-Info.plist -p ios "$DSYM_DIR"
            fi
          fi
        ignore_failure: true

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/AkifiIOS.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - dyadichev.biz@gmail.com
        notify:
          success: true
          failure: true
