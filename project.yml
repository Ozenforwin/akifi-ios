name: AkifiIOS
options:
  bundleIdPrefix: ru.akifi
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  developmentLanguage: ru
  knownRegions:
    - ru
    - en
    - es

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.3.0
    VERSIONING_SYSTEM: apple-generic
    DEVELOPMENT_TEAM: 8GPVB9MQ58
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.43.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  AkifiIOS:
    type: application
    platform: iOS
    bundleIdOverride: ru.akifi.app
    sources:
      - AkifiIOS
    dependencies:
      - package: Supabase
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebasePerformance
      - package: GoogleSignIn
      - target: AkifiWidgetExtension
    entitlements:
      path: AkifiIOS/AkifiIOS.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
        com.apple.developer.associated-domains:
          - applinks:akifi.pro
        com.apple.security.application-groups:
          - group.ru.akifi.app
    info:
      path: AkifiIOS/Info.plist
      properties:
        CFBundleDisplayName: Akifi
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        UILaunchScreen: {}
        SupabaseURL: $(SUPABASE_URL)
        SupabaseAnonKey: $(SUPABASE_ANON_KEY)
        EXCHANGE_RATE_API_KEY: $(EXCHANGE_RATE_API_KEY)
        NSMicrophoneUsageDescription: Akifi uses your microphone for voice messages with the AI financial assistant
        NSPhotoLibraryUsageDescription: Akifi needs access to your photos to set a profile picture or scan receipts
        NSCameraUsageDescription: Akifi uses the camera to scan receipts and automatically create transactions
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.447410741923-2qmj10sv278prpggutmicdjcu2l5db4r
          - CFBundleURLSchemes:
              - akifi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.akifi.app
        CODE_SIGN_ENTITLEMENTS: AkifiIOS/AkifiIOS.entitlements
        DEVELOPMENT_TEAM: 8GPVB9MQ58
        CODE_SIGN_STYLE: Automatic

  AkifiWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: AkifiWidget
      - path: AkifiIOS/Shared/Widget
    dependencies: []
    entitlements:
      path: AkifiWidget/AkifiWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ru.akifi.app
    info:
      path: AkifiWidget/Info.plist
      properties:
        CFBundleDisplayName: Akifi
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.akifi.app.widget
        CODE_SIGN_ENTITLEMENTS: AkifiWidget/AkifiWidget.entitlements
        INFOPLIST_KEY_NSSupportsLiveActivities: NO
        SKIP_INSTALL: NO
        DEVELOPMENT_TEAM: 8GPVB9MQ58
        CODE_SIGN_STYLE: Automatic

  AkifiIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AkifiIOSTests
    dependencies:
      - target: AkifiIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.akifi.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AkifiIOS:
    build:
      targets:
        AkifiIOS: all
        AkifiWidgetExtension: all
        AkifiIOSTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AkifiIOSTests
