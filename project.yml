name: AkifiIOS
options:
  bundleIdPrefix: ru.akifi
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  developmentLanguage: ru
  knownRegions:
    - ru
    - en
    - es

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.43.0"

targets:
  AkifiIOS:
    type: application
    platform: iOS
    sources:
      - AkifiIOS
    dependencies:
      - package: Supabase
    entitlements:
      path: AkifiIOS/AkifiIOS.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: AkifiIOS/Info.plist
      properties:
        CFBundleDisplayName: Akifi
        UILaunchScreen: {}
        SupabaseURL: $(SUPABASE_URL)
        SupabaseAnonKey: $(SUPABASE_ANON_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.akifi.app
        CODE_SIGN_ENTITLEMENTS: AkifiIOS/AkifiIOS.entitlements

schemes:
  AkifiIOS:
    build:
      targets:
        AkifiIOS: all
    run:
      config: Debug
