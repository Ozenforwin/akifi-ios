name: AkifiIOS
options:
  bundleIdPrefix: ru.akifi
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  developmentLanguage: ru
  knownRegions:
    - ru
    - en
    - es

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    VERSIONING_SYSTEM: apple-generic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.43.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  AkifiIOS:
    type: application
    platform: iOS
    bundleIdOverride: ru.akifi.app
    sources:
      - AkifiIOS
    dependencies:
      - package: Supabase
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebasePerformance
      - package: GoogleSignIn
    entitlements:
      path: AkifiIOS/AkifiIOS.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
    info:
      path: AkifiIOS/Info.plist
      properties:
        CFBundleDisplayName: Akifi
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        UILaunchScreen: {}
        SupabaseURL: $(SUPABASE_URL)
        SupabaseAnonKey: $(SUPABASE_ANON_KEY)
        NSMicrophoneUsageDescription: Akifi uses your microphone for voice messages with the AI financial assistant
        NSPhotoLibraryUsageDescription: Akifi needs access to your photos to set a profile picture or scan receipts
        NSCameraUsageDescription: Akifi uses the camera to scan receipts and automatically create transactions
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.447410741923-2qmj10sv278prpggutmicdjcu2l5db4r
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.akifi.app
        CODE_SIGN_ENTITLEMENTS: AkifiIOS/AkifiIOS.entitlements

schemes:
  AkifiIOS:
    build:
      targets:
        AkifiIOS: all
    run:
      config: Debug
